<div #map class="h-[60vh] sm:h-[calc(100vh-64px)]"></div>

<section
  class="h-[40vh] sm:fixed sm:top-20 sm:left-4 sm:w-[320px] sm:max-w-[calc(100vw-2rem)] sm:rounded-2xl border border-white/15 bg-black/85 p-4 shadow-2xl backdrop-blur overflow-y-auto"
>
  <div class="mb-3 flex items-center justify-between">
    <h2 class="text-xl font-bold text-white">Marcadores</h2>
    <span class="rounded-full bg-white/10 px-2 py-1 text-xs text-gray-200">
      {{ markers().length }}
    </span>
  </div>

  <div class="max-h-[58vh] space-y-2 overflow-y-visible pr-1">
    @for (marker of markers(); track marker.id) {
      <div
        class="form-control w-full rounded-xl border border-white/10 bg-white/5 p-3 text-left transition hover:bg-white/10"
      >
        <div class="flex items-center gap-3">
          <button
            type="button"
            class="btn btn-xs btn-circle btn-error btn-outline shrink-0"
            (click)="deleteMarker(marker)"
          >
            X
          </button>
          <label
            class="flex grow cursor-pointer items-center justify-between gap-3"
            (click)="flyToMarker(marker.mapboxMarker.getLngLat())"
          >
            <div class="grid grid-cols-2 gap-x-3 gap-y-1 text-xs">
              <span class="text-gray-400">Lng</span>
              <span class="font-mono text-gray-100">
                {{ marker.mapboxMarker.getLngLat().lng.toFixed(5) }}
              </span>
              <span class="text-gray-400">Lat</span>
              <span class="font-mono text-gray-100">
                {{ marker.mapboxMarker.getLngLat().lat.toFixed(5) }}
              </span>
            </div>

            <input
              type="radio"
              name="radio-10"
              class="radio"
              [style]="{ backgroundColor: marker.mapboxMarker._color }"
              checked="checked"
            />
          </label>
        </div>
      </div>
    } @empty {
      <div
        class="flex items-center justify-center rounded-xl border border-dashed border-white/20 bg-white/5 p-3"
      >
        <p class="text-xs text-gray-300">No hay marcadores</p>
      </div>
    }
  </div>
</section>
