<div class="navbar sticky top-0 z-50 border-b border-base-300/60 bg-base-100/90 px-3 shadow-sm backdrop-blur-md sm:px-4">
  <div class="navbar-start gap-2">
    <div class="dropdown lg:hidden">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle" aria-label="Abrir menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
        </svg>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content rounded-box mt-3 w-64 border border-base-300/60 bg-base-100 p-2 shadow-xl">
        @for (route of routes; track route.path) {
          <li>
            <a [routerLink]="route.path">{{ route.title }}</a>
          </li>
        }
      </ul>
    </div>

    <div class="hidden items-center gap-2 rounded-xl bg-primary/10 px-2 py-1 text-sm font-semibold text-primary sm:inline-flex">
      <span class="inline-flex h-7 w-7 items-center justify-center rounded-lg bg-primary text-primary-content font-bold">M</span>
      <span>MapsApp</span>
    </div>
  </div>

  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal gap-1 rounded-full bg-base-200/60 p-1">
      @for (route of routes; track route.path) {
        <li>
          <a [routerLink]="route.path" class="rounded-full px-4">{{ route.title }}</a>
        </li>
      }
    </ul>
  </div>

  <div class="navbar-end">
    <a class="btn btn-ghost text-base font-semibold normal-case max-w-[56vw] truncate sm:max-w-none sm:text-lg">{{ pageTitle$ | async }}</a>
  </div>
</div>
